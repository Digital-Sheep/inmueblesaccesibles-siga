<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmuebles Accesibles — Presentador Comercial</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue-950: #071A35;
            --blue-900: #0C2D58;
            --blue-800: #103F7A;
            --blue-700: #185FA5;
            --blue-600: #2077C8;
            --blue-500: #3B91E0;
            --blue-200: #B5D4F4;
            --blue-100: #DAEEFF;
            --blue-50: #EEF7FF;
            --gray-900: #1A1F2E;
            --gray-800: #2D3348;
            --gray-600: #4A5272;
            --gray-400: #8892B0;
            --gray-200: #C8D0E0;
            --gray-100: #E8ECF4;
            --gray-50: #F4F6FB;
            --white: #FFFFFF;
            --green-800: #14472D;
            --green-700: #1A5C3A;
            --green-500: #22A05A;
            --green-200: #8DC9AA;
            --green-100: #D4EDDE;
            --green-50: #EBF7F1;
            --amber-700: #7A4010;
            --amber-100: #FDEBD0;
            --red-700: #8B1A1A;
            --red-100: #FDDEDE;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: var(--blue-950);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid var(--blue-900);
            min-height: 64px;
            flex-wrap: wrap;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-svg {
            width: 48px;
            height: 32px;
            flex-shrink: 0;
        }

        .logo-text-block {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-main {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--white);
        }

        .logo-main span {
            color: var(--blue-500);
        }

        .logo-sub {
            font-size: 10px;
            font-weight: 400;
            color: var(--blue-200);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .slider-label {
            font-size: 11px;
            color: var(--blue-200);
            letter-spacing: .5px;
            white-space: nowrap;
        }

        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--blue-900);
            border: 1px solid var(--blue-800);
            border-radius: 8px;
            padding: 6px 14px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 140px;
            height: 4px;
            background: var(--blue-800);
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--blue-500);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(59, 145, 224, .25);
        }

        .val-badge {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--white);
            white-space: nowrap;
        }

        /* LAYOUT */
        .body-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem;
        }

        /* STEPPER */
        .stepper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            margin-bottom: 1.5rem;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
        }

        .step-btn {
            position: relative;
            padding: 14px 12px;
            cursor: pointer;
            border: none;
            background: transparent;
            text-align: left;
            transition: background .15s;
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .step-btn:last-child {
            border-right: none;
        }

        .step-btn:hover {
            background: var(--gray-50);
        }

        .step-btn.active {
            background: var(--blue-50);
        }

        .step-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--blue-700);
            border-radius: 3px 3px 0 0;
        }

        .step-num {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gray-400);
        }

        .step-btn.active .step-num {
            color: var(--blue-700);
        }

        .step-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            line-height: 1.3;
        }

        .step-btn.active .step-name {
            color: var(--blue-900);
        }

        .step-pct {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--gray-400);
        }

        .step-btn.active .step-pct {
            color: var(--blue-600);
        }

        /* TIMELINE */
        .timeline {
            display: flex;
            align-items: center;
            margin-bottom: 1.25rem;
            padding: 0 4px;
        }

        .tl-seg {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .tl-seg:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: var(--gray-200);
            z-index: 0;
        }

        .tl-seg.done:not(:last-child)::after {
            background: var(--blue-700);
        }

        .tl-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            position: relative;
            z-index: 1;
            border: 2px solid var(--gray-200);
            background: var(--white);
            transition: all .2s;
        }

        .tl-dot.done {
            background: var(--blue-700);
            border-color: var(--blue-700);
        }

        .tl-dot.current {
            background: var(--white);
            border-color: var(--blue-700);
            box-shadow: 0 0 0 4px var(--blue-100);
        }

        .tl-label {
            font-size: 10px;
            color: var(--gray-400);
            margin-top: 6px;
            text-align: center;
            font-weight: 500;
        }

        .tl-label.current {
            color: var(--blue-700);
        }

        /* MAIN CARD */
        .card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
            margin-bottom: 1rem;
        }

        .card-top {
            background: linear-gradient(135deg, var(--blue-950) 0%, var(--blue-900) 100%);
            padding: 1.5rem 1.5rem 1.25rem;
            position: relative;
            overflow: hidden;
        }

        .card-top::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(59, 145, 224, .15) 0%, transparent 70%);
            pointer-events: none;
        }

        .card-top-inner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(59, 145, 224, .2);
            border: 1px solid rgba(59, 145, 224, .35);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--blue-200);
            margin-bottom: 8px;
        }

        .badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--blue-500);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .5;
                transform: scale(.7)
            }
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.2;
            letter-spacing: -.4px;
        }

        .card-sub {
            font-size: 13px;
            color: var(--blue-200);
            margin-top: 4px;
        }

        .amount-block {
            text-align: right;
            flex-shrink: 0;
        }

        .amount-main {
            font-family: 'DM Mono', monospace;
            font-size: 28px;
            font-weight: 500;
            color: var(--white);
            letter-spacing: -1px;
            line-height: 1;
        }

        .amount-pct {
            font-size: 12px;
            color: var(--blue-200);
            margin-top: 4px;
            font-weight: 500;
        }

        .progress-bar {
            height: 5px;
            background: rgba(255, 255, 255, .1);
            margin-top: 1.25rem;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--blue-500), #64B5FF);
            transition: width .5s cubic-bezier(.4, 0, .2, 1);
        }

        /* CARD BODY */
        .card-body {
            padding: 1.25rem 1.5rem;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--gray-400);
            margin-bottom: .75rem;
        }

        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 1.25rem;
        }

        .item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: var(--gray-50);
            border: 1px solid var(--gray-100);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--gray-800);
            line-height: 1.45;
            font-weight: 500;
        }

        .item-icon {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            background: var(--blue-100);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 10px;
        }

        .guarantee-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 1.25rem;
        }

        .g-pill {
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.35;
            text-align: center;
            border: 1px solid;
        }

        .g-pill.yes {
            background: var(--green-100);
            color: var(--green-700);
            border-color: var(--green-200);
        }

        .g-pill.warn {
            background: var(--amber-100);
            color: var(--amber-700);
            border-color: #D4A56A;
        }

        .arg-section {
            border-top: 1px solid var(--gray-100);
            padding-top: 1.25rem;
        }

        .arg-text {
            font-size: 13px;
            color: var(--gray-600);
            line-height: 1.7;
            margin-bottom: 1rem;
        }

        .neg-toggle {
            width: 100%;
            background: none;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            text-align: left;
            font-family: 'Sora', sans-serif;
            transition: background .15s;
        }

        .neg-toggle:hover {
            background: var(--gray-50);
        }

        .neg-toggle .chevron {
            transition: transform .2s;
        }

        .neg-toggle.open .chevron {
            transform: rotate(180deg);
        }

        .neg-box {
            display: none;
            margin-top: 8px;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12px;
            line-height: 1.7;
        }

        .neg-box.open {
            display: block;
        }

        .neg-box.red {
            background: var(--red-100);
            color: var(--red-700);
            border: 1px solid #D47A7A;
        }

        .neg-box.amber {
            background: var(--amber-100);
            color: var(--amber-700);
            border: 1px solid #D4A56A;
        }

        .neg-box.green {
            background: var(--green-100);
            color: var(--green-700);
            border: 1px solid var(--green-200);
        }

        .nav-row {
            display: flex;
            gap: 8px;
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--gray-100);
        }

        .btn-prev,
        .btn-next,
        .btn-final {
            flex: 1;
            padding: 11px 16px;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-prev {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            color: var(--gray-600);
        }

        .btn-prev:hover {
            background: var(--gray-100);
        }

        .btn-next {
            background: var(--blue-700);
            color: var(--white);
        }

        .btn-next:hover {
            background: var(--blue-800);
        }

        .btn-final {
            background: linear-gradient(135deg, #0F6E56, #14A87D);
            color: var(--white);
        }

        /* RENDIMIENTO CALCULATOR (step 1 negativo) */
        .rend-calc {
            background: linear-gradient(135deg, #0A2E1A 0%, #0F3D25 100%);
            border: 1px solid var(--green-700);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-top: 1rem;
        }

        .rend-calc-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--green-200);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rend-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .rend-box {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            padding: 10px 14px;
        }

        .rend-lbl {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .45);
            margin-bottom: 4px;
        }

        .rend-val {
            font-family: 'DM Mono', monospace;
            font-size: 17px;
            font-weight: 500;
            color: var(--white);
        }

        .rend-val.green {
            color: #5DDBAA;
        }

        .rend-semanas {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: .75rem;
        }

        .rend-semanas label {
            font-size: 12px;
            color: rgba(255, 255, 255, .6);
            white-space: nowrap;
        }

        .rend-semanas input[type=range] {
            flex: 1;
            background: rgba(255, 255, 255, .15);
        }

        .rend-semanas input[type=range]::-webkit-slider-thumb {
            background: #5DDBAA;
        }

        .rend-semanas span {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: #5DDBAA;
            white-space: nowrap;
            min-width: 80px;
        }

        .rend-nota {
            font-size: 11px;
            color: rgba(255, 255, 255, .45);
            line-height: 1.5;
        }

        .rend-timeline {
            display: flex;
            gap: 6px;
            margin-bottom: .75rem;
            flex-wrap: wrap;
        }

        .rend-t-chip {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            color: rgba(255, 255, 255, .6);
        }

        .rend-t-chip.active {
            background: rgba(93, 219, 170, .15);
            border-color: rgba(93, 219, 170, .4);
            color: #5DDBAA;
        }

        /* OBJECTIONS */
        .obj-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
            margin-bottom: 1rem;
        }

        .obj-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .obj-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--blue-50);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .obj-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .obj-body {
            padding: .75rem 1rem;
        }

        .obj-item {
            border: 1px solid var(--gray-100);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .obj-q {
            width: 100%;
            background: none;
            border: none;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-800);
            text-align: left;
            transition: background .15s;
        }

        .obj-q:hover {
            background: var(--gray-50);
        }

        .obj-q .plus {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--blue-50);
            border: 1px solid var(--blue-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--blue-700);
            flex-shrink: 0;
            transition: transform .2s;
            font-weight: 700;
            line-height: 1;
        }

        .obj-q.open .plus {
            transform: rotate(45deg);
        }

        .obj-a {
            display: none;
            padding: 0 14px 12px;
            font-size: 13px;
            color: var(--gray-600);
            line-height: 1.7;
            border-top: 1px solid var(--gray-100);
            padding-top: 12px;
            background: var(--blue-50);
        }

        .obj-a.open {
            display: block;
        }

        /* METRICS */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 1rem;
        }

        .metric {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
        }

        .metric-lbl {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gray-400);
            margin-bottom: 6px;
        }

        .metric-val {
            font-family: 'DM Mono', monospace;
            font-size: 16px;
            font-weight: 500;
            color: var(--gray-900);
        }

        .metric-val.blue {
            color: var(--blue-700);
        }

        .metric-val.green {
            color: var(--green-700);
        }

        /* ENTREGA HERO (last screen) */
        .entrega-hero {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .18);
            margin-bottom: 1rem;
            position: relative;
        }

        .entrega-photo {
            width: 100%;
            max-height: 480px;
            object-fit: cover;
            display: block;
        }

        .entrega-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(7, 26, 53, .92) 0%, rgba(7, 26, 53, .3) 50%, transparent 100%);
        }

        .entrega-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
        }

        .entrega-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--green-500);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 12px;
        }

        .entrega-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.15;
            letter-spacing: -.6px;
            margin-bottom: 8px;
        }

        .entrega-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, .75);
            line-height: 1.5;
            max-width: 480px;
        }

        .entrega-stats {
            display: flex;
            gap: 1.5rem;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }

        .entrega-stat {}

        .entrega-stat-val {
            font-family: 'DM Mono', monospace;
            font-size: 22px;
            font-weight: 500;
            color: var(--white);
        }

        .entrega-stat-lbl {
            font-size: 11px;
            color: rgba(255, 255, 255, .55);
            font-weight: 500;
            letter-spacing: .5px;
        }

        /* PROMISE CARDS */
        .promise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 1rem;
        }

        .promise-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
        }

        .promise-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .promise-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 4px;
        }

        .promise-text {
            font-size: 11px;
            color: var(--gray-400);
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            padding: .75rem;
            font-size: 11px;
            color: var(--gray-400);
            border-top: 1px solid var(--gray-200);
            margin-top: .5rem;

            .header {
                padding: .75rem 1rem;
            }

            .body-wrap {
                padding: 1rem .75rem;
            }

            .card-title {
                font-size: 18px;
            }

            .amount-main {
                font-size: 22px;
            }

            .items-grid,
            .guarantee-grid {
                grid-template-columns: 1fr;
            }

            .stepper {
                grid-template-columns: repeat(2, 1fr);
            }

            input[type=range] {
                width: 90px;
            }

            .rend-grid {
                grid-template-columns: 1fr;
            }

            .entrega-title {
                font-size: 22px;
            }
        }
    </style>
</head>

        function rendHtml(v) {
            const capital = v * 0.35;
            const rendAnual = capital * 0.05;
            const rendSem = (rendAnual / 52) * semanas;
            const total = capital + rendSem;

            const chips = [12, 24, 36, 48].map(s =>
                `<span class="rend-t-chip ${semanas >= s ? 'active' : ''}">${s} sem.</span>`).join('');

            return `
    <div class="rend-calc">
      <div class="rend-calc-title">
        🔄 Protocolo dictamen negativo — Rendimiento 5% anual sobre el 35% invertido
      </div>
      <div class="rend-semanas">
        <label>Semanas en sustitución:</label>
        <input type="range" min="1" max="48" step="1" value="${semanas}" oninput="semanas=parseInt(this.value);render()" style="flex:1">
        <span>${semanas} semanas</span>
      </div>
      <div class="rend-timeline">${chips}</div>
      <div class="rend-grid">
        <div class="rend-box">
          <div class="rend-lbl">Capital invertido (35%)</div>
          <div class="rend-val">${fmt(capital)}</div>
        </div>
        <div class="rend-box">
          <div class="rend-lbl">Rendimiento 5% anual</div>
          <div class="rend-val green">${fmt(rendAnual)}/año</div>
        </div>
        <div class="rend-box">
          <div class="rend-lbl">Rendimiento acumulado (${semanas} sem.)</div>
          <div class="rend-val green">+ ${fmt(rendSem)}</div>
        </div>
        <div class="rend-box" style="border-color:rgba(93,219,170,.35)">

            $('timeline').innerHTML = tlLabels.map((l, i) => `
    <div class="tl-seg ${i < step ? 'done' : ''}">
      <div class="tl-dot ${i < step ? 'done' : i === step ? 'current' : 'pending'}"></div>
      <div class="tl-label ${i === step ? 'current' : ''}">${l}</div>
    </div>`).join('');

            const ph = phases[step];
            const amt = ph.getAmt(v);
            const pctW = step === 0 ? 1 : step === 1 ? 35 : step === 2 ? 60 : 8;
            const nc = ph.negStyle;

            const extraHtml = ph.showRendimiento ? rendHtml(v) : (ph.showEntrega ? entregaHtml(v) : '');

            $('panel').innerHTML = `
    <div class="card">
      <div class="card-top">
        <div class="card-badge"><div class="badge-dot"></div>Paso ${step + 1} de 4</div>
        <div class="card-top-inner">
          <div>
            <div class="card-title">${ph.label}</div>
            <div class="card-sub">${ph.sub}</div>
          </div>
          <div class="amount-block">
            <div class="amount-main">${fmt(amt)}</div>
            <div class="amount-pct">${ph.pctLabel}</div>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pctW}%"></div></div>
      </div>
      <div class="card-body">
        <div class="section-label">Actividades incluidas</div>
        <div class="items-grid">${ph.items.map(it => `
          <div class="item"><span class="item-icon">${it.i}</span><span>${it.t}</span></div>`).join('')}</div>
        <div class="section-label">Garantías al cliente</div>
        <div class="guarantee-grid">${ph.guarantee.map(g => `
          <div class="g-pill ${g.yes ? 'yes' : 'warn'}">${g.label}</div>`).join('')}</div>
        <div class="arg-section">
          <div class="section-label">Argumento comercial</div>
          <div class="arg-text">${ph.win}</div>
          ${extraHtml}
          <button class="neg-toggle" id="negBtn" onclick="toggleNeg()" style="margin-top:${extraHtml ? '1rem' : '0'}">
            <span>⚠️ ${ph.negLabel}</span>
            <span class="chevron">▾</span>
          </button>
          <div class="neg-box ${nc}" id="negBox">${ph.lose}</div>
          <div class="nav-row">
            ${step > 0 ? `<button class="btn-prev" onclick="go(${step - 1})">← Anterior</button>` : '<span></span>'}
            ${step < phases.length - 1
                    ? `<button class="btn-next" onclick="go(${step + 1})">Siguiente →</button>`
                    : `<button class="btn-final" onclick="window.sendPrompt&&window.sendPrompt('Genera un guion de cierre para una operación de Inmuebles Accesibles, explicando el 3% escrituración, el 5% final y el 5% anual de rendimiento en escenario negativo.')">✦ Generar guion de cierre</button>`}
          </div>
        </div>
      </div>
    </div>
    <div class="obj-card">
      <div class="obj-header">
        <div class="obj-icon">💬</div>
        <div class="obj-title">Objeciones frecuentes — respuestas de venta</div>
      </div>
      <div class="obj-body" id="objs"></div>
    </div>`;

            const objs = {
                0: [
                    ['¿Qué pasa si pido mi dinero antes de firmar?', 'El apartado de $10,000 queda retenido como garantía de la operación — no se devuelve. No es penalización: es lo que sostiene la reserva del caso. Una vez que firmas el contrato formal, entramos a la siguiente etapa.'],
                    ['¿Por qué $10,000 si no sé si va a funcionar?', 'Precisamente para eso: con $10,000 reservas el caso y nosotros hacemos la revisión inicial. El capital fuerte entra solo hasta que el dictamen confirma viabilidad.'],
                ],
                1: [
                    ['¿Por qué el 35% se cobra desde la firma?', 'Porque en el momento de firmar, el equipo ya inició: viajes, abogados en sitio, investigación registral. Son servicios ya devengados, no promesas.'],
                    ['¿Y si el dictamen sale negativo?', 'Se activa el protocolo de sustitución de garantía sin nuevos honorarios de estudio. Mientras tanto, tu capital genera un rendimiento del 5% anual. Nunca está parado.'],
                    ['¿Cómo funciona el 5% en caso negativo?', 'Se calcula sobre el 35% invertido. Si tienes $1,050,000 de inmueble, el 35% son $367,500. El 5% anual son $18,375 por año. Usa el simulador de rendimiento para ver exactamente cuánto generarías según las semanas de sustitución.'],
                ],
                2: [
                    ['¿Por qué el 60% antes de tener el inmueble?', 'Ese recurso mueve el proceso judicial. Sin él no hay ejecución. Abogados, edictos, avalúos y actuaciones hasta el desalojo están cubiertos — sin costos adicionales.'],
                    ['¿Qué pasa si me retraso?', 'La reserva ante el banco puede perderse. El contrato permite rescisión y retención de lo pagado. El plazo de 15 días hábiles desde el dictamen positivo es obligatorio.'],
                ],
                3: [
                    ['¿Cuándo exactamente pago el 3% y el 5%?', 'Al recibir el exhorto de desalojo — no antes. Ese documento es la señal legal de que el inmueble ya es tuyo.'],
                    ['¿Qué recibo exactamente al final?', 'Inmueble libre de gravámenes, sin adeudos de agua, luz ni predial, con pintura nueva, chapas cambiadas y baños operables. Como en la foto: llaves en mano.'],
                    ['¿Puedo rentar o vender desde el primer día?', 'Sí. El inmueble se entrega habilitado y libre de cargas. Puedes escriturar, rentar o vender de inmediato.'],
                ]
            };

            $('objs').innerHTML = (objs[step] || []).map((o, i) => `
    <div class="obj-item">
      <button class="obj-q" id="oq${i}" onclick="togObj(${i})">
        <span>${o[0]}</span><span class="plus">+</span>
      </button>
      <div class="obj-a" id="oa${i}">${o[1]}</div>
    </div>`).join('');

            const totalBase = 10000 + v * 0.35 + v * 0.60 + v * 0.08;
            $('metrics').innerHTML = `
    <div class="metric"><div class="metric-lbl">Inversión total</div><div class="metric-val blue">${fmt(totalBase)}</div></div>
    <div class="metric"><div class="metric-lbl">Valor del inmueble</div><div class="metric-val">${fmt(v)}</div></div>
    <div class="metric"><div class="metric-lbl">Este paso</div><div class="metric-val">${fmt(ph.getAmt(v))}</div></div>
    ${step === 1 ? `<div class="metric"><div class="metric-lbl">Rend. anual (si negativo)</div><div class="metric-val green">${fmt(v * 0.35 * 0.05)}/año</div></div>` : ''}
  `;
        }

        function go(i) { step = i; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function toggleNeg() { document.getElementById('negBtn').classList.toggle('open'); document.getElementById('negBox').classList.toggle('open'); }
        function togObj(i) { document.getElementById('oq' + i).classList.toggle('open'); document.getElementById('oa' + i).classList.toggle('open'); }

        render();
    </script>
</body>

</html>
